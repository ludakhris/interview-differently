  - id: ops-001-im-n2
    type: decision
    narrative: >
      You've pulled the database metrics. The connection spike started 6 minutes ago —
      two minutes before the payment errors appeared. A query from the reporting service
      is holding long-running transactions open for 30 seconds or more during peak load.
      This is almost certainly the cascade source. You now have 7 minutes until SLA breach.
      Your manager has just joined the incident channel.
    audioScript: >
      Good. Let's move forward. You've pulled the database metrics and here's what
      you're seeing: the connection spike started six minutes ago — two minutes
      before the payment errors appeared. A query from the reporting service is
      holding transactions open for over 30 seconds during peak load. That's your
      likely cascade source. You now have seven minutes until SLA breach, and your
      manager has just joined the incident channel.
      You've confirmed the root cause. Now I want to understand your decision-making
      here: you have two immediate options — kill the reporting service process to
      free connections instantly, or throttle the query and watch whether utilisation
      drops. How do you think about this trade-off, and what do you do?
    responsePrompt: >
      You've identified the root cause. You can kill the reporting service process immediately or throttle the query and monitor. Walk me through how you think about that trade-off and what you'd do.
