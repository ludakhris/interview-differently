id: ops-001-immersive
title: 'Incident Response: Payment Degradation (Interview)'
track: operations
estimatedMinutes: 15
mode: immersive

briefing:
  situation: >
    It's 2:47 PM on a Tuesday. You're three months into your role when your pager fires.
    Payment API error rates are climbing. Authentication is degraded. Database connections
    are at 94% capacity. Your manager is online. Your SLA breach window is 13 minutes.
    This is a verbal interview simulation — the interviewer will walk you through each
    situation and ask you to explain your thinking out loud.
  role: Junior Operations Analyst
  organisation: Fintech platform — 2.4M transactions/day, 98.9% uptime SLA
  reportsTo: Senior Operations Manager
  timeInRole: 3 months

display:
  contextStyle: monitor
  alertBanner:
    icon: ⚠
    title: ACTIVE INCIDENT — P1
    body: 'Multiple monitors firing simultaneously. Payment service degraded. SLA breach window: 13 minutes.'
  sidebar:
    - title: Your Role
      style: text
      items:
        - label: Title
          value: Junior Operations Analyst
        - label: Organisation
          value: Fintech Platform
        - label: Reports to
          value: Senior Ops Manager
        - label: Time in role
          value: 3 months
    - title: Org Context
      style: text
      items:
        - label: Daily transactions
          value: 2.4M
        - label: Uptime SLA
          value: 98.9%
        - label: Incident tier
          value: P1 — Critical
    - title: Manager's Priorities
      style: list
      items:
        - label: Payment processing
          value: P1
          emphasis: danger
        - label: User authentication
          value: P1
          emphasis: danger
        - label: Reporting dashboard
          value: P3
        - label: Internal tooling
          value: P4

rubric:
  - name: Prioritization Logic
    description: Does the candidate identify the highest-impact issue first and sequence their response correctly?
  - name: Stakeholder Communication
    description: Does the candidate communicate to the right people, at the right time, with the right level of detail?
  - name: Root Cause Reasoning
    description: Does the candidate think systematically about underlying causes rather than reacting to surface symptoms?
  - name: Confidence Under Pressure
    description: Does the candidate act decisively without overclaiming certainty or freezing in ambiguity?

nodes:
  - id: ops-001-im-n1
    type: decision
    narrative: >
      It's 2:47 PM on a Tuesday. You're three months into your role as a junior operations
      analyst. Your monitor lights up: payment API error rates have climbed to 14% in the
      last four minutes. Simultaneously, the auth service is showing elevated latency, and
      the database connection pool is at 94% utilisation. Your SLA breach window is 13
      minutes away. Multiple things are failing at once.
    audioScript: >
      Thanks for joining us today. Let's jump straight in with a live scenario.
      It's just gone 2:47 on a Tuesday afternoon. You're three months into your
      role as a junior operations analyst when your pager fires. You're looking
      at your monitoring dashboard right now — payment API errors have climbed to
      14 percent in the last four minutes. Auth service latency is up by 340
      milli-seconds. And your database connection pool is sitting at 94 percent
      utilisation. Your SLA breach window is 13 minutes away.
      Take a moment to look at the data on screen. When you're ready, tell me:
      what's your immediate read on this situation, and what's your first move?
    responsePrompt: >
      Walk me through your immediate read on this situation. What's your first move, and why?
    contextPanels:
      - label: Payment API errors
        value: 14.2%
        type: alert
      - label: Auth latency
