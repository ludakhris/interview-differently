  - id: ops-001-im-n3
    type: decision
    narrative: >
      The incident is contained. Payment error rates have dropped back below 1%.
      Your manager asks you to communicate status to the broader engineering team
      and begin preparing the post-incident write-up. You have a lot of information
      but limited time — the team is still watching the dashboards.
    audioScript: >
      The incident is contained. Payment error rates have dropped back below one
      percent. Nice work getting there. Now your manager turns to you and says:
      I need you to send a status update to the broader engineering team, and start
      on the post-incident write-up. You've got all the information in your head.
      The team is still watching the dashboards and will want to know what happened.
      Here's what I want to understand: how do you approach communicating what just
      happened — both the immediate status update and the post-incident write-up?
      What do you include, who do you write for, and what do you leave out?
    responsePrompt: >
      The incident is resolved. How do you communicate what happened to the broader engineering team, and what goes into your post-incident write-up?
