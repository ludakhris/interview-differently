id: biz-case-001
title: 'Rural Financial Inclusion: Aurelia Retail Network'
track: business case
subcategory: growth-strategy
icon: Landmark
estimatedMinutes: 35

briefing:
  situation: >
    The Northstar Foundation, a global philanthropic organisation focused on reducing
    extreme poverty, has hired your consulting firm to evaluate a new initiative. The
    Republic of Aurelia operates a network of 22,000 government-owned rural general
    stores — the "Aurelia Retail Network" — that supplies food and essentials to its
    rural population. The Foundation wants to know whether that network could also be
    used to deliver basic financial services (benefit payments, savings accounts, bill
    pay, microloans) to the country's unbanked rural communities. Today most rural
    Aurelians must travel hours to distant state-owned bank branches to collect
    government benefits, costing time, money, and exposing them to crime. Your job:
    structure the diagnostic, size the savings opportunity, interpret regional survey
    data, and recommend whether and how to roll the programme out.
  role: Strategy Analyst
  organisation: Global strategy consulting firm (Northstar Foundation engagement)
  reportsTo: Engagement Manager
  timeInRole: 6 months

display:
  contextStyle: context-cards
  sidebar:
    - title: Your Role
      style: text
      items:
        - label: Title
          value: Strategy Analyst
        - label: Engagement
          value: Northstar / Aurelia Retail
        - label: Reports to
          value: Engagement Manager
    - title: Key Facts
      style: list
      items:
        - label: Aurelia Retail stores
          value: 22,000
        - label: Aurelia population
          value: 140M
        - label: Rural share
          value: 20%
        - label: Receiving benefits
          value: 50% of rural
        - label: Monthly cost to collect
          value: 50 AUR / family

rubric:
  - name: Framework Structuring
    description: Does the candidate establish a logical framework (issue tree, MECE buckets) before diving in?
  - name: Quantitative Accuracy
    description: Are calculations correct, with assumptions stated, and reasonable accepted ranges?
  - name: Data Interpretation
    description: Does the candidate draw the right insights from exhibits — and notice what is missing?
  - name: Synthesis & Recommendation
    description: Does the candidate translate analysis into a defended recommendation with risks and next steps?

# Phase 2 scaffold — case currently has a single Structure node but is wired
# for a 4-phase consulting walkthrough. The next scenario (biz-case-002) will
# exercise sizing + exhibit phases end-to-end.
phases:
  - id: structure
    label: Structure
    description: Lay out the MECE framework before any data.
    nodeIds: [biz-case-001-n1]
    exhibitIds: [em-memo]
    rubricDimensions: [Framework Structuring]
  - id: sizing
    label: Sizing
    description: Quantify the savings opportunity for rural Aurelians.
    nodeIds: [biz-case-001-n3, biz-case-001-n4]
    exhibitIds: [rural-population-table, savings-profit-tree]
    rubricDimensions: [Quantitative Accuracy]
  - id: exhibits
    label: Read Exhibits
    description: Interpret regional survey data.
    nodeIds: [biz-case-001-n5]
    exhibitIds: [regional-uptake-survey]
    rubricDimensions: [Data Interpretation]
  - id: recommendation
    label: Recommendation
    description: Defend a phased rollout with risks and next steps.
    nodeIds: [biz-case-001-n6]
    exhibitIds: [rollout-matrix]
    rubricDimensions: [Synthesis & Recommendation]

# ── Exhibit catalog ─────────────────────────────────────────────────────────
# Each phase pulls from this list by id. One exhibit can appear in multiple
# phases (e.g. a foundational data table introduced in Sizing and re-used in
# Recommendation).
exhibits:
  # 1 — text-exhibit (Structure): EM's voicemail-style framing memo.
  - id: em-memo
    kind: text-exhibit
    title: Memo from Engagement Manager
    caption: 'Received 8:47 AM — frame your thinking before the brief'
    footnote: 'Internal, do not forward'
    blocks:
      - kind: paragraph
        text: >
          Northstar wants a clean answer to "should we use the Aurelia Retail
          Network to deliver financial services to the rural unbanked?" — not
          a survey of options, not a McKinsey 7S. A defensible yes/no with
          the sizing to back it.
      - kind: bullets
        items:
          - The Foundation already believes this could help millions; our job is to test that belief, not validate it.
          - 'Three weeks of fieldwork get us regional survey data — design your framework so we know what data is decisive.'
          - 'Watch for the easy trap: assuming uptake. We have signal, not proof.'
      - kind: quote
        text: 'If the answer doesn''t change the Foundation''s capital allocation, it''s not the answer they hired us for.'
        attribution: Engagement Manager

  # 2 — data-table (Sizing): rural population breakdown by region. Sortable.
  - id: rural-population-table
    kind: data-table
    title: Rural population by region
    caption: 'Source: Aurelia National Statistics Bureau, 2024 release'
    footnote: 'Region totals exclude transient seasonal workers (≈2% national).'
    columns:
      - { key: region, label: Region, align: left, format: text, sortable: true }
      - { key: pop, label: Rural pop, format: number, sortable: true }
      - { key: benefits, label: On benefits, format: number, sortable: true }
      - { key: share, label: Share, format: percent, sortable: true }
      - { key: stores, label: Network stores, format: number, sortable: true }
    rows:
      - { region: Northern Highlands, pop: 4200000, benefits: { value: 2300000, tone: accent }, share: 55, stores: 3100 }
      - { region: Central Plains, pop: 8900000, benefits: 4100000, share: 46, stores: 7200 }
      - { region: Eastern Coast, pop: 5600000, benefits: 2800000, share: 50, stores: 4500 }
      - { region: Western Delta, pop: 6100000, benefits: { value: 3400000, tone: accent, emphasis: true }, share: 56, stores: 4800 }
      - { region: Southern Range, pop: 3200000, benefits: 1400000, share: 44, stores: 2400 }
    totalRow:
      { region: { value: Total, emphasis: true }, pop: 28000000, benefits: 14000000, share: 50, stores: 22000 }

  # 3 — profit-tree (Sizing): savings opportunity decomposition.
  - id: savings-profit-tree
    kind: profit-tree
    title: Annual savings opportunity — issue tree
    caption: 'Each branch surfaces an assumption worth testing.'
    root:
      id: root
      label: Annual savings to rural population
      value: '$2.1B'
      formula: families × monthly cost × 12 months
      tone: accent
      children:
        - id: families
          label: Rural families receiving benefits
          value: 3.5M
          formula: 14M people ÷ 4 per family
          children:
            - { id: people, label: People on benefits, value: 14M }
            - { id: avgfam, label: Avg household size, value: 4.0 }
        - id: cost
          label: Cost per collection trip
          value: 50 AUR
          formula: travel + lost wages + risk premium
          tone: danger
          children:
            - { id: travel, label: Bus / fuel cost, value: 18 AUR }
            - { id: wages, label: Lost wages (½ day), value: 25 AUR }
            - { id: risk, label: 'Theft / risk reserve', value: 7 AUR }
        - id: freq
          label: Trips per year
          value: 12
          formula: monthly benefit cycle
          children:
            - { id: cycle, label: Benefit disbursement, value: monthly }
            - { id: alt, label: Alt schedule (quarterly)?, value: '— not adopted' }

  # 4 — chart (Read Exhibits): regional pilot uptake over 6 months.
  - id: regional-uptake-survey
    kind: chart
    title: Western Delta pilot — service uptake (Months 0-6)
    caption: 'Households opening at least one financial account, % of eligible.'
    footnote: 'Survey n=4,200 households, Western Delta pilot, 2024.'
    chart:
      title: Cumulative uptake
      unit: '%'
      color: green
      baseline: 25
      annotation:
        tIndex: 3
        label: '↑ SMS reminder rollout'
      series:
        - { t: M0, v: 4 }
        - { t: M1, v: 9 }
        - { t: M2, v: 17 }
        - { t: M3, v: 26 }
        - { t: M4, v: 38 }
        - { t: M5, v: 47 }
        - { t: M6, v: 53 }

  # 5 — segmentation-matrix (Recommendation): rollout prioritisation 2×2.
  - id: rollout-matrix
    kind: segmentation-matrix
    title: Regional rollout prioritisation
    caption: 'Plot each region by demand signal × infrastructure readiness.'
    footnote: 'Demand: % on benefits × uptake trend. Readiness: network density + agent training.'
    xAxis: { label: Infrastructure readiness, lowLabel: Low, highLabel: High }
    yAxis: { label: Demand signal, lowLabel: Low, highLabel: High }
    quadrantLabels:
      topLeft: Invest to enable
      topRight: Phase 1 — launch
      bottomLeft: Defer
      bottomRight: Adjacent expansion
    quadrants:
      topLeft:
        - { label: Northern Highlands, caption: 'High need, sparse network' }
      topRight:
        - { label: Western Delta, caption: 'Pilot region — proven uptake' }
        - { label: Central Plains, caption: 'Largest pop, mature network' }
      bottomLeft:
        - { label: Southern Range, caption: 'Lowest benefit share' }
      bottomRight:
        - { label: Eastern Coast, caption: 'Urban migration risk' }

nodes:
  - id: biz-case-001-n1
    type: decision
    narrative: >
      Your engagement manager hands you the brief and asks for your initial framework.
      Before any data, before any exhibits — how do you propose the team should structure
      the investigation? She wants to see how you'd organize the question into MECE buckets
      so the team can divide up the workstreams.
    contextPanels:
      - label: Network reach
        value: 22,000
        unit: stores
        type: info
        caption: ~1 store per 1,300 rural residents
      - label: Rural population
        value: 28M
        unit: people
        type: info
        share: 20
        caption: 20% of 140M total
      - label: On state benefits
        value: 14M
        unit: '50%'
        type: metric
        tone: accent
        share: 50
        caption: share of rural pop.
      - label: Days to read-out
        value: '5'
        type: alert
        tone: danger
        caption: EM expects framework by Friday
    choices:
      - id: A
        text: Start with three buckets — benefits to the rural population, benefits to the government / state bank / Aurelia Retail, and risks of the venture.
        next: biz-case-001-n2a
        signals:
          Framework Structuring: strong
          Synthesis & Recommendation: strong
      - id: B
        text: Jump straight into sizing the savings opportunity — the financials will tell us whether the programme is worth pursuing.
        next: biz-case-001-n2b
        signals:
          Framework Structuring: developing
          Quantitative Accuracy: proficient
      - id: C
        text: Start with risk analysis — fraud, crime, and operational capacity are the dealbreakers.
        next: biz-case-001-n2c
        signals:
          Framework Structuring: proficient
          Synthesis & Recommendation: proficient
      - id: D
        text: Survey rural Aurelians first to understand demand. Without proven uptake, the rest of the analysis is theoretical.
        next: biz-case-001-n2d
        signals:
          Framework Structuring: proficient
          Data Interpretation: strong

  # Choice A — strong framework — leads into the Sizing phase via a transition.
  - id: biz-case-001-n2a
    type: transition
    narrative: >
      Strong open. The EM nods at the three-bucket frame, hands you the rural
      population exhibit, and tells you to size the savings opportunity for the
      rural population first. "Start with how many families collect benefits —
      then we'll build the savings number."
    next: biz-case-001-n3

  # Choices B/C/D get a short corrective redirect from the EM and rejoin
  # the case at the Sizing phase — better learning than ending after one move.
  - id: biz-case-001-n2b
    type: transition
    narrative: >
      Sizing first leaves you defending numbers without a frame. Your EM steers
      you back: structure the three buckets first, then we'll attack the savings
      math together.
    next: biz-case-001-n3

  - id: biz-case-001-n2c
    type: transition
    narrative: >
      Risk-first is a real bucket, but it isn't the whole frame. Your EM nods
      at the instinct and redirects you to the full three-bucket structure,
      then on to sizing.
    next: biz-case-001-n3

  - id: biz-case-001-n2d
    type: transition
    narrative: >
      Demand surveys take weeks we don't have. Your EM agrees demand matters,
      but pushes you to start with the three-bucket frame and rely on the
      existing Western Delta pilot data instead.
    next: biz-case-001-n3

  # ── Sizing phase ────────────────────────────────────────────────────────────
  # Step 1: estimate families on benefits from rural population on benefits.
  - id: biz-case-001-n3
    type: quant
    narrative: 'Step 1 — size the population.'
    quantSignalDimensions: [Quantitative Accuracy]
    quant:
      variant: numeric-range
      prompt: How many rural families receive state benefits today?
      context: >
        Aurelia National Statistics Bureau reports 14M rural people on state
        benefits, with an average rural household of 4.0 people. Estimate the
        number of families receiving benefits.
      field:
        id: families
        label: Rural families on benefits
        unit: families
        format: integer
        acceptedRange:
          min: 3000000
          max: 4000000
          idealMin: 3400000
          idealMax: 3600000
        modelAnswer: 3500000
        derivation: >
          14M people ÷ 4 people per household ≈ 3.5M families. Acceptable band
          allows ±15% to absorb assumptions on household size; ideal band
          rewards landing within the model figure.
    next: biz-case-001-n4

  # Step 2: annual savings via formula carrying forward `families` from n3.
  - id: biz-case-001-n4
    type: quant
    narrative: 'Step 2 — size the savings opportunity.'
    quantSignalDimensions: [Quantitative Accuracy]
    quant:
      variant: numeric-range
      prompt: What is the annual savings opportunity for rural families if benefits move to Aurelia Retail?
      context: >
        Each collection trip costs a family ~50 AUR (bus + lost wages + risk).
        Benefits disburse monthly, so families travel once per month. Build
        the savings figure from your earlier population estimate.
      formula:
        display: families × monthly cost × 12 months
        expression: '{families} * {cost} * 12'
        variables:
          - name: families
            label: Families on benefits
            unit: families
            format: integer
            source:
              nodeId: biz-case-001-n3
          - name: cost
            label: Cost per collection trip
            unit: AUR
            format: integer
            defaultValue: 50
      field:
        id: savings
        label: Annual savings
        unit: AUR
        format: currency
        acceptedRange:
          min: 1800000000
          max: 2400000000
          idealMin: 2050000000
          idealMax: 2150000000
        modelAnswer: 2100000000
        derivation: >
          3.5M families × 50 AUR per trip × 12 trips per year ≈ 2.1B AUR
          annual savings. Accepted band covers ±15% on the input assumptions.
    next: biz-case-001-n5

  # ── Read Exhibits phase ─────────────────────────────────────────────────────
  # n5: candidate reads the Western Delta uptake survey and the regional
  # population table together. The right answer is the substitution +
  # affordability read; B/C/D tempt cheaper traps.
  - id: biz-case-001-n5
    type: decision
    narrative: >
      The Western Delta pilot uptake chart shows 53% adoption by month 6 against
      a 25% baseline target. The regional population table tells you Western Delta
      has the *highest* benefit share (56%) in the country. Which read is the
      strongest signal for national rollout?
    choices:
      - id: A
        text: 'Western Delta proves the model works where demand is genuine: high benefit share + an SMS reminder is enough to double baseline uptake. Translate the playbook to similar regions before scaling everywhere.'
        next: biz-case-001-n6
        signals: { Data Interpretation: strong, Synthesis & Recommendation: strong }
      - id: B
        text: 'Western Delta is special — coastal, denser, more literate. Treat 53% uptake as a ceiling, not a base case, and assume half of that nationally.'
        next: biz-case-001-n5-fb-b
        signals: { Data Interpretation: proficient }
      - id: C
        text: '53% by month 6 means the curve still hasn''t plateaued — launch nationally now to capture the same trajectory everywhere.'
        next: biz-case-001-n5-fb-c
        signals: { Data Interpretation: developing, Synthesis & Recommendation: developing }
      - id: D
        text: 'Uptake is uptake; what matters is cost-to-serve. We need the unit economics before we read demand.'
        next: biz-case-001-n5-fb-d
        signals: { Data Interpretation: developing }

  - id: biz-case-001-n5-fb-b
    type: transition
    narrative: >
      The "ceiling" framing is too conservative — Western Delta is the *floor*
      for high-benefit-share regions, not the ceiling. Your EM redirects: take
      the lessons forward into the recommendation.
    next: biz-case-001-n6
  - id: biz-case-001-n5-fb-c
    type: transition
    narrative: >
      53% uptake by month 6 isn't yet a national base case — the other regions
      have different demographics. Your EM redirects: factor that into the
      recommendation.
    next: biz-case-001-n6
  - id: biz-case-001-n5-fb-d
    type: transition
    narrative: >
      Unit economics matter, but you already sized the savings ($2.1B/yr) —
      that's the cost-to-serve answer at scale. Your EM redirects you to the
      recommendation.
    next: biz-case-001-n6

  # ── Recommendation phase ───────────────────────────────────────────────────
  - id: biz-case-001-n6
    type: decision
    narrative: >
      You have the structure, the savings sized at ~2.1B AUR/year, the pilot
      uptake at 53%, and the rollout matrix sorted by demand × readiness. Three
      weeks to the read-out. What do you recommend to the Northstar Foundation?
    choices:
      - id: A
        text: 'Phased rollout, starting with Western Delta + Central Plains in Year 1 (proven uptake, mature network). Use Aurelia Retail as the agent network; pre-build training pipeline for Northern Highlands before Year 2 expansion.'
        next: biz-case-001-end-a
        signals:
          Synthesis & Recommendation: strong
          Framework Structuring: strong
      - id: B
        text: 'National launch across all five regions simultaneously — Foundation has the capital and the data supports demand everywhere.'
        next: biz-case-001-end-b
        signals: { Synthesis & Recommendation: developing }
      - id: C
        text: 'Pilot one more region before any rollout — Western Delta alone is not enough proof for a national programme.'
        next: biz-case-001-end-c
        signals: { Synthesis & Recommendation: proficient }
      - id: D
        text: 'Recommend the Foundation NOT proceed. Aurelia Retail is government-owned; the political risk is too high.'
        next: biz-case-001-end-d
        signals: { Synthesis & Recommendation: developing }

  - id: biz-case-001-end-a
    type: feedback
    narrative: strong-phased-rollout
  - id: biz-case-001-end-b
    type: feedback
    narrative: national-too-fast
  - id: biz-case-001-end-c
    type: feedback
    narrative: pilot-again
  - id: biz-case-001-end-d
    type: feedback
    narrative: walk-away
